# ZimboSocials stack.
#
# Designed to sit ALONGSIDE the Slyker Tech stack on the same host: it binds
# only to 127.0.0.1, and the existing nginx (which owns 80/443 and the
# LetsEncrypt certs) proxies the domain to 127.0.0.1:${APP_PORT}. See
# docker/README-deploy.md.
#
# The big win over cPanel: real queue workers and a real scheduler, so the
# WhatsApp webhook stops doing AI calls inline.

services:
  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-zimbosocials}
      MARIADB_USER: ${DB_USERNAME:-zimbosocials}
      MARIADB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?set DB_ROOT_PASSWORD in .env}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      # Localhost only — never expose a database to the internet.
      - "127.0.0.1:${DB_PORT_HOST:-3307}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=3306
    volumes:
      # Persist user uploads (payment proofs) and logs across rebuilds.
      - storage_app:/var/www/html/storage/app
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: nginx:alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - storage_app:/var/www/html/storage/app:ro
    ports:
      # Bound to localhost: the host's nginx terminates TLS and proxies here.
      - "127.0.0.1:${APP_PORT:-8081}:80"
    depends_on:
      - app
    restart: unless-stopped

  # Real queue worker — this is what removes the inline-webhook latency.
  # 'notifications' must be listed: campaigns and alerts ride that queue.
  queue:
    build: .
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=3306
    command: php artisan queue:work --queue=notifications,default --sleep=1 --tries=3 --max-time=3600
    volumes:
      - storage_app:/var/www/html/storage/app
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Replaces the cPanel cron entry. schedule:work keeps running and fires each
  # due task itself, so there is no crontab to configure.
  scheduler:
    build: .
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=3306
    command: php artisan schedule:work
    volumes:
      - storage_app:/var/www/html/storage/app
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
  storage_app:
  storage_logs:
