# ZimboSocials — internal nginx. Serves public/ and hands .php to php-fpm.
#
# This does NOT terminate TLS: the stack binds to 127.0.0.1 and the host's
# existing nginx (which owns 80/443 and the LetsEncrypt certs) proxies to it.

server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 20M;          # payment proofs / uploads

    # Real client IP + scheme from the upstream proxy, so Laravel builds correct
    # URLs and rate limiting sees the visitor rather than the proxy.
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTPS $http_x_forwarded_proto;
        fastcgi_read_timeout 60s;      # webhook processes inline; give it room
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Long cache for hashed Vite assets.
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    access_log /dev/stdout;
    error_log  /dev/stderr;
}
