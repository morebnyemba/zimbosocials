<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0B3E09">
    <title>You're offline — Zimbo Socials</title>
    <style>
        :root { color-scheme: light dark; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: 'Figtree', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: radial-gradient(120% 120% at 50% 0%, #ecfdf5 0%, #ffffff 55%);
            color: #064e3b;
            text-align: center;
        }
        .card { max-width: 420px; }
        img { width: 96px; height: 96px; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; margin: 0 0 8px; }
        p { color: #047857; line-height: 1.6; margin: 0 0 24px; }
        button {
            appearance: none; border: 0; cursor: pointer;
            background: #0B3E09; color: #fff; font-weight: 600;
            padding: 12px 24px; border-radius: 9999px; font-size: 1rem;
            transition: transform .15s ease, background .15s ease;
        }
        button:hover { background: #145210; transform: translateY(-1px); }
        @media (prefers-color-scheme: dark) {
            body { background: #042f2e; color: #d1fae5; }
            p { color: #6ee7b7; }
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="/pwa-192x192.png" alt="Zimbo Socials">
        <h1>You're offline</h1>
        <p>We can't reach the Zimbo Socials servers right now. Check your connection and try again — your work is safe.</p>
        <button onclick="location.reload()">Try again</button>
    </div>
</body>
</html>
